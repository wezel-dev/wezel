[workspace]
resolver = "3"
members = ["crates/pheromone_cli", "crates/pheromone_types", "crates/burrow"]

[workspace.package]
repository = "https://github.com/wezel-dev/wezel"
publish = false
edition = "2024"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
pheromone_types = { path = "crates/pheromone_types" }
ureq = "2"
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
