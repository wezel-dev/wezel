services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wezel
      POSTGRES_PASSWORD: wezel
      POSTGRES_DB: wezel
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wezel"]
      interval: 5s
      timeout: 5s
      retries: 10

  burrow:
    environment:
      DATABASE_URL: postgres://wezel:wezel@db:5432/wezel
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: