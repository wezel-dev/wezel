services:
  burrow:
    build:
      context: .
      dockerfile: Dockerfile.burrow
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://wezel:wezel@db:5432/wezel}
    ports:
      - "3000:3000"

  anthill:
    build:
      context: .
      dockerfile: Dockerfile.anthill
      args:
        VITE_BURROW_URL: ${VITE_BURROW_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - burrow
