name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  plan:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      tag: ${{ steps.version.outputs.tag }}
      cargo_version: ${{ steps.version.outputs.cargo_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install dist
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep -m1 '^version' crates/wezel_cli/Cargo.toml | sed -E 's/.*"(.+)".*/\1/')
          DATETIME=$(date -u +%Y%m%d%H%M%S)
          SHORT_SHA=$(git rev-parse --short HEAD)
          CARGO_VERSION="${BASE_VERSION}-pre.${DATETIME}+${SHORT_SHA}"
          TAG="v${CARGO_VERSION}"
          echo "cargo_version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Nightly tag: ${TAG}"
      - name: Pin wezel_cli to nightly version
        shell: bash
        run: |
          sed -i.bak -E "s/^version = .*/version = \"${{ steps.version.outputs.cargo_version }}\"/" crates/wezel_cli/Cargo.toml
          rm crates/wezel_cli/Cargo.toml.bak
          grep '^version' crates/wezel_cli/Cargo.toml
      - id: plan
        run: |
          dist plan --tag="${{ steps.version.outputs.tag }}" --output-format=json > plan.json
          echo "matrix=$(jq -c '.ci.github.artifacts_matrix' plan.json)" >> "$GITHUB_OUTPUT"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist

  build-local:
    name: build-local (${{ join(matrix.targets, ', ') }})
    needs: plan
    if: ${{ fromJson(needs.plan.outputs.matrix).include != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Rust in container
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Pin wezel_cli to nightly version
        shell: bash
        run: |
          sed -i.bak -E "s/^version = .*/version = \"${{ needs.plan.outputs.cargo_version }}\"/" crates/wezel_cli/Cargo.toml
          rm crates/wezel_cli/Cargo.toml.bak
      - name: Capture build SHA before pinning Cargo.toml dirties the tree
        shell: bash
        run: echo "WEZEL_BUILD_SHA=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ join(matrix.targets, '-') }}
      - name: Build local artifacts
        run: dist build --tag="${{ needs.plan.outputs.tag }}" --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p upload
          cp target/distrib/*.tar.gz upload/ 2>/dev/null || true
          cp target/distrib/*.tar.xz upload/ 2>/dev/null || true
          cp target/distrib/*.zip upload/ 2>/dev/null || true
          cp target/distrib/*.sha256 upload/ 2>/dev/null || true
          cp dist-manifest.json "upload/dist-manifest-${{ join(matrix.targets, '-') }}.json"
      - uses: actions/upload-artifact@v6
        with:
          name: nightly-local-${{ join(matrix.targets, '-') }}
          path: upload/*

  build-global:
    needs: [plan, build-local]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      - name: Pin wezel_cli to nightly version
        shell: bash
        run: |
          sed -i.bak -E "s/^version = .*/version = \"${{ needs.plan.outputs.cargo_version }}\"/" crates/wezel_cli/Cargo.toml
          rm crates/wezel_cli/Cargo.toml.bak
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: nightly-local-*
          path: target/distrib/
          merge-multiple: true
      - name: Build global artifacts
        shell: bash
        run: |
          dist build --tag="${{ needs.plan.outputs.tag }}" --output-format=json --artifacts=global > dist-manifest.json
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p upload
          jq --raw-output ".upload_files[]" dist-manifest.json | while read -r f; do
            [ -f "$f" ] && cp "$f" upload/
          done
          cp dist-manifest.json upload/dist-manifest-global.json
      - uses: actions/upload-artifact@v6
        with:
          name: nightly-global
          path: upload/*

  release:
    needs: [plan, build-local, build-global]
    if: ${{ always() && needs.build-local.result == 'success' && needs.build-global.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          pattern: nightly-*
          path: artifacts
          merge-multiple: true
      - name: Merge dist manifests
        shell: bash
        run: |
          python3 -c "
          import json, glob

          merged_artifacts = {}
          releases = {}

          for path in sorted(glob.glob('artifacts/dist-manifest-*.json')):
              m = json.load(open(path))
              for k, v in m.get('artifacts', {}).items():
                  if k not in merged_artifacts:
                      merged_artifacts[k] = v
              for r in m.get('releases', []):
                  name = r.get('app_name', '')
                  if name not in releases:
                      releases[name] = dict(r)
                      releases[name]['artifacts'] = list(r.get('artifacts', []))
                  else:
                      for a in r.get('artifacts', []):
                          if a not in releases[name]['artifacts']:
                              releases[name]['artifacts'].append(a)

          result = {'artifacts': merged_artifacts, 'releases': list(releases.values())}
          json.dump(result, open('artifacts/dist-manifest.json', 'w'), indent=2)
          print(f'Merged {len(merged_artifacts)} artifacts from {len(releases)} releases')
          "
          rm -f artifacts/dist-manifest-*.json
      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.plan.outputs.tag }}
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          gh release create "$TAG" \
            --prerelease \
            --title "Nightly $(date -u +%Y-%m-%d) (${SHORT_SHA})" \
            --notes "Automated nightly build from \`main\` at ${SHORT_SHA}." \
            artifacts/*
