#:schema ../../schema.json
description = "Measures incremental build cost of adding a function"

[step.cargo.baseline]
command = "build"
build_target = "workspace"
summary.build-time = { measurement = "time_ms", aggregation = "mean", bisect = false, samples = 5 }

[step.llvm-lines.measure-llvm]
package = "wezel_types"
summary.total-llvm-lines = { measurement = "llvm-lines", filter = { summary_unit = "lines" } }
summary.total-llvm-copies = { measurement = "llvm-lines", filter = { summary_unit = "copies" }, bisect = false }